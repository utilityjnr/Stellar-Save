name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Frontend Tests & Coverage ──────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Rust Contract Tests & Coverage ─────────────────────────────────────────
  contracts:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run contract tests with coverage
        run: |
          cargo llvm-cov \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --lcov \
            --output-path lcov.info \
            -- --test-threads=1

      - name: Check coverage threshold (95%)
        run: |
          cargo llvm-cov \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --summary-only \
            -- --test-threads=1 2>&1 | tee coverage_summary.txt
          
          # Extract line coverage percentage
          LINE_COV=$(grep -oP 'Lines\s+\K[\d.]+(?=%)' coverage_summary.txt || echo "0")
          echo "Line coverage: ${LINE_COV}%"
          
          # Fail if below 95%
          python3 -c "
          cov = float('${LINE_COV}' or 0)
          if cov < 95.0:
              print(f'Coverage {cov:.1f}% is below the 95% threshold')
              exit(1)
          print(f'Coverage {cov:.1f}% meets the 95% threshold')
          "

      - name: Generate HTML coverage report
        run: |
          cargo llvm-cov \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --html \
            --output-dir coverage-html \
            -- --test-threads=1

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-coverage
          path: coverage-html/
          retention-days: 30

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          flags: contracts
          name: rust-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build Verification ──────────────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [frontend, contracts]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Soroban contract
        run: |
          cargo build \
            --manifest-path contracts/stellar-save/Cargo.toml \
            --target wasm32-unknown-unknown \
            --release
